

services:

  nginx:
    image: nginx:latest
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api

  api:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - db
      - redis
    

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops
      POSTGRES_DB: devopsdb
    ports:
      - "5432:5432"  
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - api

  grafana:
    image: grafana/grafana
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
    depends_on:
      - loki
  
  xmls:
    image: willianletro/sefaz_xml_downloader:latest
    environment:
      - TZ=America/Sao_Paulo
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./sefaz_xml_downloader:/app
      #- ./xmls:/app/xmls
      - /home/prod/xmls:/app/xmls
      - /mnt/consinco:/mnt/consinco


volumes:
  postgres_data:
  grafana_data:
  prometheus_data:
  loki_data:

